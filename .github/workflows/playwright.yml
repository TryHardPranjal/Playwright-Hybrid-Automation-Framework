name: Playwright Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:

      test_env:
        description: Choose environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

      test_suite:
        description: Choose suite
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - api
          - regression
          - e2e

      browser:
        description: Choose browser
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - crossbrowser


permissions:
  contents: read
  pages: write
  id-token: write


jobs:

  test:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:

      TEST_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_env || 'dev' }}

      TEST_SUITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite || 'all' }}

      BROWSER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser || 'chromium' }}

      WEB_URL: ${{ vars.WEB_URL }}

      API_URL: ${{ vars.API_URL }}

      MOCKAPI_BASE_URL: ${{ vars.MOCKAPI_BASE_URL }}

      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      REQRES_EMAIL: ${{ secrets.REQRES_EMAIL }}

      REQRES_PASSWORD: ${{ secrets.REQRES_PASSWORD }}

      PST_EMAIL: ${{ secrets.PST_EMAIL }}

      PST_PASSWORD: ${{ secrets.PST_PASSWORD }}


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 22
          cache: npm


      - name: Cache Playwright Browsers
        uses: actions/cache@v4

        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}


      - name: Install dependencies
        run: npm ci


      - name: Install browsers
        run: npx playwright install --with-deps


      - name: Run Tests

        shell: bash
      
        run: |
      
          EXIT_CODE=0
      
          npm run clean
      
          if [ "${{ github.event_name }}" = "push" ]; then
      
            echo "Running Chromium UI + Hybrid"
      
            npx playwright test --project=chromium || EXIT_CODE=1
      
            echo "Running API Tests"
      
            npx playwright test --project=api || EXIT_CODE=1
      
          else
      
            if [ "$BROWSER" = "crossbrowser" ]; then
      
                npx playwright test \
                --project=chromium \
                --project=firefox \
                --project=webkit || EXIT_CODE=1
      
            else
      
                if [ "$TEST_SUITE" = "all" ]; then
      
                    npx playwright test \
                    --project=$BROWSER || EXIT_CODE=1
      
                else
      
                    npx playwright test \
                    --project=$BROWSER \
                    --grep @$TEST_SUITE || EXIT_CODE=1
      
                fi
      
            fi
      
          fi
      
          exit $EXIT_CODE


      - name: Upload Debug Files

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: debug-files

          path: |
            playwright-report/**
            test-results/**


      - name: Generate Allure Report

        if: always()

        run: |

          if [ -d "allure-results" ]; then
              npm run allure:generate
          else
              mkdir -p allure-report
              echo "<h1>No Results Generated</h1>" > allure-report/index.html
          fi


      - name: Upload Allure Report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: allure-report

          path: allure-report/


      - name: Upload Playwright Report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: playwright-report

          path: playwright-report/


      - name: Setup GitHub Pages

        if: always()

        uses: actions/configure-pages@v5


      - name: Upload Pages Artifact

        if: always()

        uses: actions/upload-pages-artifact@v3

        with:

          path: allure-report/


      - name: Deploy Allure Report

        if: always()

        id: deployment

        uses: actions/deploy-pages@v4