name: Playwright Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      test_env:
        description: Choose environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

      test_suite:
        description: Choose suite
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - api
          - regression
          - e2e

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_env || 'dev' }}
      TEST_SUITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite || 'all' }}
      WEB_URL: ${{ vars.WEB_URL }}
      API_URL: ${{ vars.API_URL }}
      MOCKAPI_BASE_URL: ${{ vars.MOCKAPI_BASE_URL }}
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      REQRES_EMAIL: ${{ secrets.REQRES_EMAIL }}
      REQRES_PASSWORD: ${{ secrets.REQRES_PASSWORD }}
      PST_EMAIL: ${{ secrets.PST_EMAIL }}
      PST_PASSWORD: ${{ secrets.PST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      - name: Run selected tests
        shell: bash
        run: |
          if [ "$TEST_SUITE" = "all" ]; then
            npm run test
          else
            npm run "test:${TEST_SUITE}"
          fi

      - name: Generate Allure Report

        if: always()

        run: |

          if [ -d "allure-results" ]; then
            npm run allure:generate
          else
            mkdir allure-report
            echo "<h1>No results generated</h1>" > allure-report/index.html
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  deploy-pages:
    needs: test
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: .

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy Allure Report
        id: deployment
        uses: actions/deploy-pages@v4
