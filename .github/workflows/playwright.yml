name: Playwright Automation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:

      test_env:
        description: Choose environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - qa
          - stage
          - prod

      test_suite:
        description: Choose suite
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - api
          - regression
          - e2e

      browser:
        description: Choose browser
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - crossbrowser


permissions:
  contents: read
  pages: write
  id-token: write


jobs:

  test:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:

      TEST_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_env || 'dev' }}

      TEST_SUITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.test_suite || 'all' }}

      BROWSER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser || 'chromium' }}

      WEB_URL: ${{ vars.WEB_URL }}

      API_URL: ${{ vars.API_URL }}

      MOCKAPI_BASE_URL: ${{ vars.MOCKAPI_BASE_URL }}

      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      REQRES_EMAIL: ${{ secrets.REQRES_EMAIL }}

      REQRES_PASSWORD: ${{ secrets.REQRES_PASSWORD }}

      PST_EMAIL: ${{ secrets.PST_EMAIL }}

      PST_PASSWORD: ${{ secrets.PST_PASSWORD }}


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4

        with:
          node-version: 22
          cache: npm


      - name: Cache Playwright Browsers
        uses: actions/cache@v4

        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}


      - name: Install dependencies
        run: npm ci


      - name: Install browsers
        run: npx playwright install --with-deps


      - name: Validate Environment Variables

        shell: bash

        run: |

          echo "Checking required environment variables..."

          [ -z "$WEB_URL" ] && echo "WEB_URL missing" && exit 1
          [ -z "$API_URL" ] && echo "API_URL missing" && exit 1
          [ -z "$MOCKAPI_BASE_URL" ] && echo "MOCKAPI_BASE_URL missing" && exit 1
          [ -z "$PST_EMAIL" ] && echo "PST_EMAIL missing" && exit 1
          [ -z "$PST_PASSWORD" ] && echo "PST_PASSWORD missing" && exit 1

          echo "Environment validation passed"


      - name: Run Tests

        shell: bash

        run: |

          EXIT_CODE=0

          npm run clean

          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "pull_request" ]]; then

              echo "Running Chromium UI + Hybrid Tests"

              npx playwright test --project=chromium || EXIT_CODE=1

              echo "Running API Tests"

              npx playwright test --project=api || EXIT_CODE=1

          else

              if [[ "$TEST_SUITE" == "api" ]]; then

                  echo "Running API Suite"

                  npx playwright test \
                  --project=api || EXIT_CODE=1


              elif [[ "$BROWSER" == "crossbrowser" ]]; then

                  if [[ "$TEST_SUITE" == "all" ]]; then

                      npx playwright test \
                      --project=chromium \
                      --project=firefox \
                      --project=webkit || EXIT_CODE=1

                  else

                      npx playwright test \
                      --project=chromium \
                      --project=firefox \
                      --project=webkit \
                      --grep "@$TEST_SUITE" || EXIT_CODE=1

                  fi


              else

                  if [[ "$TEST_SUITE" == "all" ]]; then

                      npx playwright test \
                      --project=$BROWSER || EXIT_CODE=1

                  else

                      npx playwright test \
                      --project=$BROWSER \
                      --grep "@$TEST_SUITE" || EXIT_CODE=1

                  fi

              fi

          fi

          exit $EXIT_CODE


      - name: Upload Debug Files

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: debug-files

          path: |
            playwright-report/**
            test-results/**


      - name: Generate Allure Report
        if: always()
        shell: bash
      
        run: |
      
          mkdir -p allure-report
      
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
      
            npm run allure:generate
      
            if [ $? -ne 0 ]; then
      
              echo "Allure generation failed"
      
              echo "<html><body><h1>Allure generation failed</h1><p>Tests executed but report creation failed.</p></body></html>" > allure-report/index.html
      
            fi
      
          else
      
            echo "<html><body><h1>No test results generated</h1><p>Execution stopped before tests produced results.</p></body></html>" > allure-report/index.html
      
          fi
      

      - name: Upload Allure Report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: allure-report

          path: allure-report/


      - name: Upload Playwright Report

        if: always()

        uses: actions/upload-artifact@v4

        with:

          name: playwright-report

          path: playwright-report/


      - name: Setup GitHub Pages

        if: always() && github.ref == 'refs/heads/main'

        uses: actions/configure-pages@v5


      - name: Upload Pages Artifact

        if: always() && github.ref == 'refs/heads/main'

        uses: actions/upload-pages-artifact@v3

        with:
          path: allure-report/


      - name: Deploy Allure Report

        if: always() && github.ref == 'refs/heads/main'

        id: deployment

        uses: actions/deploy-pages@v4